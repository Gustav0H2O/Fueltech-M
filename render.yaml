services:
  - type: web
    name: fueltech-master
    runtime: node
    plan: free
    buildCommand: npm install && npm run seed
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      # Cámbiala por tu dominio propio cuando lo conectes (afecta canonical, sitemap y Open Graph).
      - key: BASE_URL
        value: https://fueltech-master.onrender.com
      # Modelo de IA (Gemini). Ajusta solo si tu cuenta tiene acceso a otro id válido.
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      # La API key del chat se configura como secreto en el panel de Render (no en texto plano aquí).
      - key: GEMINI_API_KEY
        sync: false
      # Google Analytics 4 (ya integrado en el código; cambia el ID aquí si algún día lo necesitas).
      - key: GA_MEASUREMENT_ID
        value: G-MXGS03FKB0
      # Contraseña del panel /admin. Configúrala como SECRETO en el panel de Render.
      # Sin esta variable, el panel de administración queda DESACTIVADO (seguro por defecto).
      - key: ADMIN_PASSWORD
        sync: false
